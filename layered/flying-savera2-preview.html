<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flying Savera 2 — layer preview</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; min-height: 100%;
      background: radial-gradient(circle at 50% 30%, #1a2a4a 0%, #060914 70%);
      font-family: -apple-system, system-ui, sans-serif;
      color: #cbd5e1;
    }
    header {
      padding: 18px 24px 10px;
      display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap;
    }
    header h1 { margin: 0; font-size: 16px; font-weight: 500; letter-spacing: 0.04em; opacity: 0.85; }
    header p  { margin: 0; font-size: 12px; opacity: 0.55; }

    main {
      display: grid;
      grid-template-columns: 260px 1fr 1fr;
      gap: 18px;
      padding: 10px 24px 24px;
      align-items: start;
    }
    .panel {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 14px;
    }
    .panel h2 {
      margin: 0 0 10px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.55;
      font-weight: 600;
    }

    .layers { display: flex; flex-direction: column; gap: 4px; }
    .layers label {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }
    .layers label:hover { background: rgba(255,255,255,0.04); }
    .layers label.isolated { background: rgba(91,172,232,0.18); outline: 1px solid rgba(91,172,232,0.4); }
    .layers label .swatch {
      display: inline-block; width: 10px; height: 10px; border-radius: 2px;
      background: #5bace8;
    }
    .layers label input[type="checkbox"] { accent-color: #5bace8; }
    .layers .oldid {
      margin-left: auto; font-size: 10px; opacity: 0.4; font-family: ui-monospace, monospace;
    }
    .actions { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .actions button {
      font: inherit; font-size: 11px;
      padding: 5px 9px; border-radius: 5px; cursor: pointer;
      background: rgba(255,255,255,0.06);
      color: inherit; border: 1px solid rgba(255,255,255,0.1);
    }
    .actions button:hover { background: rgba(255,255,255,0.1); }

    .stage { display: flex; align-items: center; justify-content: center; }
    .stage object, .stage img {
      width: 100%; max-width: 600px; aspect-ratio: 1/1; display: block;
      background: rgba(255,255,255,0.95);
      border-radius: 8px;
    }
    .stage .label { font-size: 11px; opacity: 0.5; margin-top: 6px; text-align: center; }
  </style>
</head>
<body>
  <header>
    <h1>Flying Savera 2 — layer preview</h1>
    <p>Toggle layers to verify names. Click a name to isolate it.</p>
  </header>

  <main>
    <section class="panel">
      <h2>Layers (top → bottom)</h2>
      <div class="actions">
        <button data-action="all-on">All on</button>
        <button data-action="all-off">All off</button>
        <button data-action="invert">Invert</button>
      </div>
      <div id="layer-list" class="layers"></div>
    </section>

    <section class="panel">
      <h2>New — flying savera2.svg</h2>
      <div class="stage">
        <object id="svg-new" type="image/svg+xml" data="flying savera2.svg"></object>
      </div>
      <div class="stage label">layered/flying savera2.svg</div>
    </section>

    <section class="panel">
      <h2>Original — flying savera.svg</h2>
      <div class="stage">
        <object type="image/svg+xml" data="../flying savera.svg"></object>
      </div>
      <div class="stage label">flying savera.svg</div>
    </section>
  </main>

  <script>
    // Displayed top→bottom in panel, but render order in SVG is bottom→top (last = on top).
    // The SVG has <g> elements in this document order (bottom→top):
    const RENDER_ORDER = [
      "speed-lines", "cape-inner", "back-hair", "right-arm", "legs", "cape",
      "mouth", "topwear", "cape-highlights", "head", "emblem", "eyes",
      "front-hair", "boot-detail"
    ];
    // Panel order = reversed (top of visual stack first)
    const PANEL_ORDER = [...RENDER_ORDER].reverse();

    const DISPLAY_NAMES = {
      "speed-lines":     ["Speed lines",     "Layer_14"],
      "cape-inner":      ["Cape (inner)",    "Layer_13"],
      "back-hair":       ["Back hair",       "Layer_3"],
      "right-arm":       ["Right arm",       "Layer_7"],
      "legs":            ["Legs",            "Layer_9"],
      "cape":            ["Cape",            "Layer_5"],
      "mouth":           ["Mouth",           "Layer_4"],
      "topwear":         ["Topwear",         "Layer_6"],
      "cape-highlights": ["Cape highlights", "Layer_8"],
      "head":            ["Head",            "Layer_2"],
      "emblem":          ["Chest emblem",    "Layer_12"],
      "eyes":            ["Eyes",            "Layer_10"],
      "front-hair":      ["Front hair",      "Layer_1"],
      "boot-detail":     ["Boot detail",     "Layer_11"],
    };

    const listEl = document.getElementById("layer-list");
    const svgObject = document.getElementById("svg-new");

    function buildList() {
      listEl.innerHTML = "";
      PANEL_ORDER.forEach((id) => {
        const [name, oldId] = DISPLAY_NAMES[id];
        const label = document.createElement("label");
        label.dataset.id = id;
        label.innerHTML = `
          <input type="checkbox" checked data-id="${id}">
          <span>${name}</span>
          <span class="oldid">${oldId}</span>
        `;
        label.addEventListener("dblclick", (e) => {
          e.preventDefault();
          isolate(id);
        });
        listEl.appendChild(label);
      });
    }

    function getSvgDoc() {
      return svgObject.contentDocument;
    }

    function applyVisibility() {
      const doc = getSvgDoc();
      if (!doc) return;
      document.querySelectorAll("#layer-list input[type=checkbox]").forEach((cb) => {
        const g = doc.getElementById(cb.dataset.id);
        if (g) g.style.display = cb.checked ? "" : "none";
      });
    }

    function isolate(targetId) {
      document.querySelectorAll("#layer-list input[type=checkbox]").forEach((cb) => {
        cb.checked = cb.dataset.id === targetId;
      });
      document.querySelectorAll("#layer-list label").forEach((l) => {
        l.classList.toggle("isolated", l.dataset.id === targetId);
      });
      applyVisibility();
    }

    listEl.addEventListener("change", () => {
      document.querySelectorAll("#layer-list label").forEach((l) => l.classList.remove("isolated"));
      applyVisibility();
    });

    document.querySelectorAll(".actions button").forEach((btn) => {
      btn.addEventListener("click", () => {
        const action = btn.dataset.action;
        document.querySelectorAll("#layer-list label").forEach((l) => l.classList.remove("isolated"));
        document.querySelectorAll("#layer-list input[type=checkbox]").forEach((cb) => {
          if (action === "all-on") cb.checked = true;
          else if (action === "all-off") cb.checked = false;
          else if (action === "invert") cb.checked = !cb.checked;
        });
        applyVisibility();
      });
    });

    svgObject.addEventListener("load", applyVisibility);
    buildList();
  </script>
</body>
</html>
