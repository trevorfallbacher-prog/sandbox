<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Savera — animated</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: radial-gradient(circle at 50% 30%, #1a2a4a 0%, #060914 70%);
      font-family: -apple-system, system-ui, sans-serif;
      color: #cbd5e1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    h1 { font-weight: 500; letter-spacing: 0.04em; margin: 0 0 12px; font-size: 16px; opacity: 0.7; }
    .stage {
      width: min(520px, 85vw);
      aspect-ratio: 1024 / 1536;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stage object { width: 100%; height: 100%; }
    .controls { margin-top: 12px; font-size: 12px; opacity: 0.5; }
  </style>
</head>
<body>
  <h1>Savera — idle / talking on the phone</h1>
  <div class="stage">
    <object type="image/svg+xml" data="savera-animated.svg" aria-label="Savera animated"></object>
  </div>
  <div class="controls">breathing · head sway · hair · mouth · hand gesture</div>
</body>
</html>
