<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Savera — Flying v2 (layered SVG)</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; height: 100%;
      background: radial-gradient(circle at 50% 30%, #1a2a4a 0%, #060914 70%);
      font-family: -apple-system, system-ui, sans-serif;
      color: #cbd5e1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    h1 { font-weight: 500; letter-spacing: 0.04em; margin: 0 0 12px; font-size: 16px; opacity: 0.75; }
    #stage {
      width: min(600px, 85vw);
      aspect-ratio: 1 / 1;
    }
    #stage svg { width: 100%; height: 100%; display: block; }
    .caption { margin-top: 12px; font-size: 12px; opacity: 0.5; }

    /* ----- Animations driven by semantic layer ids -----
       transform-box: fill-box is critical so % transform-origins resolve
       against each group's own bounding box instead of the SVG root. */
    #stage svg {
      animation: float 3.2s ease-in-out infinite;
      transform-origin: 50% 60%;
      transform-box: view-box;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0)    rotate(0deg); }
      50%      { transform: translateY(-24px) rotate(-2deg); }
    }

    #stage svg g[id] { transform-box: fill-box; }

    /* Back hair — big slow wave */
    #back-hair {
      transform-origin: 90% 20%;
      animation: hair-wave-back 2.8s ease-in-out infinite;
    }
    @keyframes hair-wave-back {
      0%, 100% { transform: rotate(0deg) translateX(0); }
      50%      { transform: rotate(-4deg) translateX(-6px); }
    }

    /* Front hair — small counter-wave */
    #front-hair {
      transform-origin: 80% 20%;
      animation: hair-wave-front 3.4s ease-in-out infinite;
    }
    @keyframes hair-wave-front {
      0%, 100% { transform: rotate(0deg); }
      50%      { transform: rotate(2deg); }
    }

    /* Cape sweep — includes inner + highlights so they move together */
    #cape, #cape-inner, #cape-highlights {
      transform-origin: 90% 50%;
      animation: cape-sweep 3.2s ease-in-out infinite;
    }
    @keyframes cape-sweep {
      0%, 100% { transform: rotate(0deg) translateX(0); }
      50%      { transform: rotate(-3deg) translateX(-10px); }
    }

    /* Right-arm tremor (extended forward fist) */
    #right-arm {
      transform-origin: 10% 50%;
      animation: arm-tremor 2.1s ease-in-out infinite;
    }
    @keyframes arm-tremor {
      0%, 100% { transform: rotate(0deg); }
      50%      { transform: rotate(1.6deg); }
    }

    /* Legs tremor */
    #legs {
      transform-origin: 80% 20%;
      animation: leg-tremor 2.6s ease-in-out infinite;
    }
    @keyframes leg-tremor {
      0%, 100% { transform: rotate(0deg); }
      50%      { transform: rotate(-2deg); }
    }

    /* Speed lines pulsing forward */
    #speed-lines {
      transform-origin: 100% 50%;
      animation: speed-pulse 0.85s linear infinite;
    }
    @keyframes speed-pulse {
      0%   { opacity: 0.25; transform: translateX(30px) scaleX(0.8); }
      60%  { opacity: 0.95; transform: translateX(0)    scaleX(1); }
      100% { opacity: 0;    transform: translateX(-60px) scaleX(1.15); }
    }

    /* Emblem pulse */
    #emblem {
      transform-origin: 50% 50%;
      animation: emblem-pulse 2.2s ease-in-out infinite;
    }
    @keyframes emblem-pulse {
      0%, 100% { transform: scale(1);    filter: drop-shadow(0 0 0 rgba(91,172,232,0)); }
      50%      { transform: scale(1.06); filter: drop-shadow(0 0 8px rgba(91,172,232,0.75)); }
    }

    .status { font-size: 11px; opacity: 0.4; margin-top: 4px; font-family: ui-monospace, monospace; }
  </style>
</head>
<body>
  <h1>Savera — flying idle v2 (layered SVG)</h1>
  <div id="stage" aria-label="Savera flying"></div>
  <div class="caption">float · hair wave · cape sweep · arm/leg tremor · speed pulse</div>
  <div id="status" class="status"></div>

  <script>
    const stage = document.getElementById("stage");
    const status = document.getElementById("status");

    fetch("../../layered/flying%20savera2.svg")
      .then(r => {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.text();
      })
      .then(markup => {
        // Strip XML prolog / DOCTYPE if present so innerHTML parses cleanly.
        const cleaned = markup
          .replace(/<\?xml[^?]*\?>/, "")
          .replace(/<!DOCTYPE[^>]*>/i, "")
          .trim();
        stage.innerHTML = cleaned;

        const svg = stage.querySelector("svg");
        if (!svg) {
          status.textContent = "SVG loaded but <svg> element not found.";
          return;
        }
        // Ensure it paints at full size.
        svg.setAttribute("width", "100%");
        svg.setAttribute("height", "100%");

        const found = [...svg.querySelectorAll("g[id]")].map(g => g.id);
        status.textContent = "Animating " + found.length + " layers: " + found.join(", ");
      })
      .catch(err => {
        stage.textContent = "";
        status.textContent = "Failed to load SVG: " + err.message +
          " — this page needs to be served over http:// (not opened via file://). " +
          "From the repo root run:  python3 -m http.server 8000  then open " +
          "http://localhost:8000/lottie/call-center/savera-flying2.html";
        status.style.opacity = "0.9";
        status.style.color = "#f3a18e";
      });
  </script>
</body>
</html>
