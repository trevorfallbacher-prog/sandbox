<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Savera — Flying v2 (layered SVG)</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; height: 100%;
      background: radial-gradient(circle at 50% 30%, #1a2a4a 0%, #060914 70%);
      font-family: -apple-system, system-ui, sans-serif;
      color: #cbd5e1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    h1 { font-weight: 500; letter-spacing: 0.04em; margin: 0 0 12px; font-size: 16px; opacity: 0.75; }
    #stage {
      width: min(600px, 85vw);
      aspect-ratio: 1 / 1;
    }
    #stage svg { width: 100%; height: 100%; display: block; }
    .caption { margin-top: 12px; font-size: 12px; opacity: 0.5; }

    /* ----- Animations driven by semantic layer ids ----- */
    #stage svg { animation: float 3.6s ease-in-out infinite; transform-origin: 50% 50%; }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-14px) rotate(-1.5deg); }
    }

    /* Hair waves — back and front at slightly different phases */
    #back-hair {
      transform-origin: 75% 35%;
      animation: hair-wave-back 2.8s ease-in-out infinite;
    }
    @keyframes hair-wave-back {
      0%, 100% { transform: rotate(0deg) translateX(0); }
      50%      { transform: rotate(-2.2deg) translateX(-3px); }
    }
    #front-hair {
      transform-origin: 70% 30%;
      animation: hair-wave-front 3.2s ease-in-out infinite;
    }
    @keyframes hair-wave-front {
      0%, 100% { transform: rotate(0deg); }
      50%      { transform: rotate(1.2deg); }
    }

    /* Cape sweep */
    #cape, #cape-inner, #cape-highlights {
      transform-origin: 55% 55%;
      animation: cape-sweep 3.6s ease-in-out infinite;
    }
    @keyframes cape-sweep {
      0%, 100% { transform: skewY(0deg) translateX(0); }
      50%      { transform: skewY(-1.8deg) translateX(-6px); }
    }

    /* Subtle right-arm tremor (fist extended forward) */
    #right-arm {
      transform-origin: 70% 45%;
      animation: arm-tremor 2.2s ease-in-out infinite;
    }
    @keyframes arm-tremor {
      0%, 100% { transform: rotate(0deg); }
      50%      { transform: rotate(0.9deg); }
    }

    /* Leg tremor */
    #legs {
      transform-origin: 45% 60%;
      animation: leg-tremor 2.6s ease-in-out infinite;
    }
    @keyframes leg-tremor {
      0%, 100% { transform: rotate(0deg); }
      50%      { transform: rotate(-1.1deg); }
    }

    /* Speed lines — pulse forward */
    #speed-lines {
      animation: speed-pulse 0.9s ease-out infinite;
      transform-origin: 0% 60%;
    }
    @keyframes speed-pulse {
      0%   { opacity: 0.25; transform: translateX(20px) scaleX(0.85); }
      70%  { opacity: 0.9;  transform: translateX(0)    scaleX(1); }
      100% { opacity: 0;    transform: translateX(-40px) scaleX(1.1); }
    }

    /* Emblem faint glow pulse */
    #emblem {
      transform-origin: 66% 45%;
      animation: emblem-pulse 2.4s ease-in-out infinite;
    }
    @keyframes emblem-pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(91,172,232,0)); }
      50%      { transform: scale(1.03); filter: drop-shadow(0 0 6px rgba(91,172,232,0.6)); }
    }
  </style>
</head>
<body>
  <h1>Savera — flying idle v2 (layered SVG)</h1>
  <div id="stage" aria-label="Savera flying"></div>
  <div class="caption">float · hair wave · cape sweep · arm/leg tremor · speed pulse</div>

  <script>
    // Inline-inject the SVG so CSS can target the semantic group ids.
    fetch("../../layered/flying%20savera2.svg")
      .then(r => r.text())
      .then(markup => {
        document.getElementById("stage").innerHTML = markup;
      })
      .catch(err => {
        document.getElementById("stage").textContent = "Failed to load SVG: " + err;
      });
  </script>
</body>
</html>
