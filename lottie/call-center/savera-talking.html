<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Savera — Lottie</title>
  <style>
    html, body {
      margin: 0; height: 100%;
      background: radial-gradient(circle at 50% 30%, #1a2a4a 0%, #060914 70%);
      font-family: -apple-system, system-ui, sans-serif;
      color: #cbd5e1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    h1 { font-weight: 500; letter-spacing: 0.04em; margin: 0 0 12px; font-size: 16px; opacity: 0.7; }
    #stage {
      width: min(520px, 85vw);
      aspect-ratio: 1024 / 1536;
    }
    .caption { margin-top: 12px; font-size: 12px; opacity: 0.5; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body>
  <h1>Savera — Lottie (savera-talking.json)</h1>
  <div id="stage"></div>
  <div class="caption">breathing · head · hair · mouth · hand · phone</div>
  <script>
    lottie.loadAnimation({
      container: document.getElementById('stage'),
      renderer: 'svg',
      loop: true,
      autoplay: true,
      path: 'savera-talking.json'
    });
  </script>
</body>
</html>
